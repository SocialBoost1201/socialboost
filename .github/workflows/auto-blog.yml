name: AI Blog Auto Generate

on:
  schedule:
    # 毎週月曜 09:00 JST (00:00 UTC) に自動実行
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      keyword:
        description: '記事のキーワード（省略時はリストからランダム選択）'
        required: false
        type: string

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate and Publish Blog Article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          MANUAL_KEYWORD: ${{ inputs.keyword }}
        run: node .github/scripts/generate-blog.mjs

      - name: Commit and Push AI Thumbnail
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/ai-blogs/
          if git diff --staged --quiet; then
            echo "No new thumbnails to commit."
          else
            git commit -m "chore: add AI generated thumbnail"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Trigger Vercel Redeploy (If hook is set)
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -X POST "$VERCEL_DEPLOY_HOOK"
            echo "✅ Vercel redeploy triggered by webhook"
          else
            echo "ℹ️ VERCEL_DEPLOY_HOOK is not set. Assuming the Git push triggered the deploy automatically."
          fi
